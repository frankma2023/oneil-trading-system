<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}欧奈尔投资系统{% endblock %}</title>
    
    <!-- Google字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- ECharts图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    
    <!-- 统一设计系统 -->
    <link rel="stylesheet" href="/static/css/dark_theme.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
    <!-- 页面特定CSS -->
    {% block extra_css %}{% endblock %}
    
    <style>
        /* 页面特定样式可以在这里添加 */
        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .app-main {
            flex: 1;
            padding: var(--space-xl) 0;
        }
        
        .page-header {
            margin-bottom: var(--space-2xl);
            text-align: center;
        }
        
        .page-title {
            font-family: var(--font-display);
            font-size: var(--text-4xl);
            font-weight: var(--font-weight-bold);
            color: var(--text-primary);
            margin-bottom: var(--space-xs);
            background: linear-gradient(135deg, var(--data-positive), var(--signal-highlight));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .page-subtitle {
            font-size: var(--text-lg);
            color: var(--text-tertiary);
            max-width: 800px;
            margin: 0 auto;
        }
        
        .section {
            margin-bottom: var(--space-3xl);
        }
        
        .section-title {
            font-family: var(--font-heading);
            font-size: var(--text-2xl);
            font-weight: var(--font-weight-semibold);
            color: var(--text-primary);
            margin-bottom: var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }
        
        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border-medium), transparent);
        }
        
        .grid-cards {
            display: grid;
            gap: var(--space-lg);
        }
        
        @media (min-width: 1200px) {
            .grid-cards-4 {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (min-width: 768px) and (max-width: 1199px) {
            .grid-cards-4 {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 767px) {
            .grid-cards-4 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="unified-nav">
        <!-- 导航栏将由JavaScript注入 -->
    </nav>
    
    <div class="app-container">
        <!-- 主内容 -->
        <main class="app-main container">
            {% block content %}{% endblock %}
        </main>
        
        <!-- 页脚 -->
        <footer style="padding: var(--space-xl) 0; border-top: 1px solid var(--border-light); margin-top: var(--space-3xl);">
            <div class="container" style="text-align: center;">
                <div style="font-size: var(--text-sm); color: var(--text-tertiary); margin-bottom: var(--space-xs);">
                    欧奈尔投资系统 · 基于威廉·欧奈尔投资理念
                </div>
                <div style="font-size: var(--text-xs); color: var(--text-muted);">
                    数据来源：理杏仁API · 数据更新：每日收盘后
                </div>
            </div>
        </footer>
    </div>
    
    <!-- 统一导航脚本 -->
    <script src="/static/js/nav.js"></script>
    
    <!-- 页面特定JavaScript -->
    {% block extra_js %}{% endblock %}
    
    <script>
        // 基础页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 页面加载动画
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.3s ease-out';
            
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
            
            // 错误处理
            window.addEventListener('error', function(e) {
                console.error('页面错误:', e.error);
            });
        });
    </script>
</body>
</html>
